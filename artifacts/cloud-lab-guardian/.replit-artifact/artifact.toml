kind = "web"
previewPath = "/"
title = "Cloud Lab Guardian"
version = "1.0.0"
id = "artifacts/cloud-lab-guardian"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20255

[services.development]
run = "pnpm --filter @workspace/cloud-lab-guardian run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cloud-lab-guardian", "run", "build" ]
serve = "static"
publicDir = "artifacts/cloud-lab-guardian/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20255"
BASE_PATH = "/"
