version: 1
applications:
  - appRoot: artifacts/cloud-lab-guardian
    frontend:
      phases:
        preBuild:
          commands:
            - cd ../..
            - corepack enable
            - corepack pnpm install --frozen-lockfile --config.dangerously-allow-all-builds=true
        build:
          commands:
            - cd ../..
            - BASE_PATH=/ corepack pnpm --filter @workspace/cloud-lab-guardian build
            - ls -la artifacts/cloud-lab-guardian/dist
            - test -f artifacts/cloud-lab-guardian/dist/index.html
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - node_modules/**/*
