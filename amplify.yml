version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - corepack pnpm install --frozen-lockfile --config.dangerously-allow-all-builds=true
    build:
      commands:
        - BASE_PATH=/ corepack pnpm --filter @workspace/cloud-lab-guardian build
  artifacts:
    baseDirectory: artifacts/cloud-lab-guardian/dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - artifacts/cloud-lab-guardian/node_modules/**/*
